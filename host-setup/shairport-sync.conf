// shairport-sync NATIVO en la Pi (receptor AirPlay 2).
// Copiar a /etc/shairport-sync.conf  (ver host-setup/README.md).
// Usa el avahi/dbus/audio del host -> convive con librespot sin romper nada.

general = {
    name = "RaspberryPi";
    // Rango de volumen (dB) que se mapea al slider/botones del iPhone.
    volume_range_db = 60;
};

alsa = {
    // DAC USB (card "Audio"). Nativo SI resuelve el nombre de tarjeta,
    // que es mas estable entre reinicios que el numero.
    output_device = "plughw:CARD=Audio,DEV=0";
    // Libera la tarjeta en reposo para que librespot pueda usarla.
    disable_standby_mode = "auto";
};
