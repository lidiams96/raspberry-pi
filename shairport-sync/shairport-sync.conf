// Configuracion de shairport-sync (receptor AirPlay 2).
// Mas opciones: https://github.com/mikebrady/shairport-sync/blob/master/scripts/shairport-sync.conf

general = {
    name = "RaspberryPi";
    // Rango de volumen en dB que se mapea al slider del iPhone.
    // 60 dB es un rango amplio y comodo para uso domestico.
    volume_range_db = 60;
};

alsa = {
    // Mismo dongle USB que usa Spotify (librespot): card 2 "Audio [USB Audio]".
    // Se referencia por NUMERO (hw:2,0) y no por nombre (CARD=Audio) porque la
    // imagen minimalista de shairport-sync no resuelve nombres de tarjeta
    // (daba "output_device_error_19" = ENODEV). plughw permite que ALSA
    // convierta el formato si el DAC no acepta el nativo.
    output_device = "plughw:2,0";
    // "auto": libera la tarjeta de sonido cuando no reproduce,
    // asi librespot puede usarla cuando AirPlay esta en reposo.
    disable_standby_mode = "auto";
};
