# Ajusta las URLs si tu Pi no responde a "raspberrypi.local"
# (puedes usar su IP local, p.ej. http://192.168.1.50/admin).

- Red:
    - Pi-hole:
        href: http://raspberrypi.local/admin
        description: Bloqueo de anuncios (DNS)
        icon: pi-hole.png
        widget:
          type: pihole
          url: http://192.168.1.146       # IP de la Pi (el contenedor no resuelve .local)
          version: 6
          key: "{{HOMEPAGE_VAR_PIHOLE_KEY}}"   # se rellena desde .env (PIHOLE_API_KEY)

    - Tailscale:
        href: https://login.tailscale.com/admin/machines
        description: VPN / acceso remoto
        icon: tailscale.png

- Multimedia:
    - AirPlay (audio):
        description: shairport-sync nativo (RaspberryPi)
        icon: mdi-apple-airplay-audio

    - AirPlay (vídeo / pantalla):
        description: UxPlay nativo -> TV por HDMI
        icon: mdi-apple-airplay
